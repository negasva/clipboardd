<style>
  :root {
    --bg: #000000;
    --surface: #0E0E10;
    --surface-2: #161618;
    --line: rgba(255,255,255,0.08);
    --text: #FFFFFF;
    --text-dim: rgba(255,255,255,0.55);
    --accent: #3D2BFF;
    --accent-soft: #5847FF;
    --yellow: #F4F378;
    --mint: #C9F27E;
    --pink: #FF87C8;
    --ink: #0A0A0B;
    --radius: 28px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  body {
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(61,43,255,0.18), transparent 60%),
      radial-gradient(900px 500px at 0% 30%, rgba(244,243,120,0.05), transparent 60%),
      var(--bg);
    min-height: 100vh;
  }
  ::selection { background: var(--accent); color: white; }

  .display { font-family: 'Space Grotesk', sans-serif; font-weight: 600; letter-spacing: -0.02em; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* Card baseline */
  .card {
    position: relative;
    border-radius: var(--radius);
    padding: 24px;
    overflow: hidden;
    transition: transform .35s cubic-bezier(.2,.8,.2,1), box-shadow .35s;
    will-change: transform;
  }
  .card:hover { transform: translateY(-3px); }
  .card-tl { position: absolute; top: 22px; left: 24px; right: 24px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .card-bl { position: absolute; bottom: 22px; left: 24px; right: 24px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .card-title { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 15px; letter-spacing: 0.01em; }

  .icon-btn {
    width: 38px; height: 38px;
    border-radius: 999px;
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.08);
    color: inherit;
    border: 0; cursor: pointer;
    transition: background .2s, transform .2s;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.16); transform: scale(1.06); }
  .icon-btn.dark { background: rgba(0,0,0,0.08); }
  .icon-btn.dark:hover { background: rgba(0,0,0,0.16); }

  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 10px; border-radius: 999px;
    background: rgba(255,255,255,0.06);
    color: var(--text-dim);
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
    border: 1px solid var(--line);
  }

  /* Top bar */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 28px;
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(14px);
    background: rgba(0,0,0,0.55);
    border-bottom: 1px solid var(--line);
  }
  .brand {
    display: inline-flex; align-items: center; gap: 12px;
    font-family: 'Space Grotesk', sans-serif; font-weight: 600;
    font-size: 18px; letter-spacing: -0.01em;
  }
  .brand-mark {
    width: 32px; height: 32px; border-radius: 10px;
    background: var(--accent);
    display: inline-flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 20px -6px rgba(61,43,255,0.7);
  }

  .nav { display: flex; gap: 6px; align-items: center; }
  .nav a {
    color: var(--text-dim); font-size: 13px; font-weight: 500;
    text-decoration: none; padding: 9px 14px; border-radius: 999px;
    transition: color .2s, background .2s;
  }
  .nav a:hover { color: var(--text); background: rgba(255,255,255,0.06); }

  .search {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 14px; border-radius: 999px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--line);
    min-width: 280px;
  }
  .search input {
    background: transparent; border: 0; outline: 0;
    color: var(--text); font: inherit; font-size: 13px;
    flex: 1;
  }
  .search input::placeholder { color: var(--text-dim); }
  .kbd {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    padding: 3px 6px; border-radius: 6px;
    background: rgba(255,255,255,0.08);
    color: var(--text-dim);
    border: 1px solid var(--line);
  }

  /* Hero */
  .hero {
    padding: 56px 28px 28px;
    max-width: 1440px; margin: 0 auto;
  }
  .hero h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600; letter-spacing: -0.035em;
    font-size: clamp(48px, 8vw, 112px);
    line-height: 0.95;
    margin: 0 0 24px;
  }
  .hero h1 .accent { color: var(--accent); }
  .hero h1 em { font-style: italic; font-family: 'Space Grotesk', sans-serif; font-weight: 400; }
  .hero-meta {
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    margin-top: 8px;
  }

  .stats-row {
    display: flex; gap: 28px; padding-top: 28px;
    border-top: 1px solid var(--line); margin-top: 36px;
    color: var(--text-dim); font-size: 12px;
  }
  .stat strong { color: var(--text); font-family: 'Space Grotesk', sans-serif; font-size: 22px; display:block; margin-bottom:4px; letter-spacing:-0.02em; }

  /* Bento grid */
  .grid-wrap { padding: 16px 28px 80px; max-width: 1440px; margin: 0 auto; }
  .section-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 6px; margin-top: 22px;
  }
  .section-head h2 {
    font-family: 'Space Grotesk', sans-serif; font-weight: 500;
    font-size: 14px; letter-spacing: 0.05em; text-transform: uppercase;
    color: var(--text-dim); margin: 0;
    display: inline-flex; align-items: center; gap: 10px;
  }
  .section-head h2::before {
    content: ""; width: 8px; height: 8px; border-radius: 999px; background: var(--accent);
  }
  .section-head .add {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 14px; border-radius: 999px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--line);
    color: var(--text); font-size: 12px; font-weight: 500;
    cursor: pointer; transition: background .2s;
  }
  .section-head .add:hover { background: rgba(255,255,255,0.1); }

  .bento {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 16px;
  }
  .clip-card {
    grid-column: span 4;
    min-height: 260px;
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--text);
    cursor: pointer;
  }
  .clip-card.feature {
    grid-column: span 6;
    grid-row: span 2;
    min-height: 540px;
  }
  .clip-card.wide { grid-column: span 8; }
  .clip-card.half { grid-column: span 6; }
  .clip-card.tall { grid-row: span 2; min-height: 540px; }

  .clip-card.blue { background: var(--accent); color: white; border-color: transparent; }
  .clip-card.yellow { background: var(--yellow); color: var(--ink); border-color: transparent; }
  .clip-card.white { background: white; color: var(--ink); border-color: transparent; }
  .clip-card.mint { background: var(--mint); color: var(--ink); border-color: transparent; }
  .clip-card.pink { background: var(--pink); color: var(--ink); border-color: transparent; }

  .clip-headline {
    font-family: 'Space Grotesk', sans-serif; font-weight: 600;
    letter-spacing: -0.025em;
    font-size: clamp(28px, 3.4vw, 56px);
    line-height: 1.0;
    margin-top: 56px;
    text-wrap: balance;
  }
  .clip-card.feature .clip-headline { font-size: clamp(40px, 4.8vw, 84px); }

  .clip-preview {
    margin-top: 18px;
    font-size: 13px;
    line-height: 1.55;
    opacity: 0.8;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .clip-card.feature .clip-preview { -webkit-line-clamp: 8; font-size: 14px; }

  .clip-meta-row { display: flex; gap: 8px; align-items: center; }
  .clip-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; padding: 5px 9px; border-radius: 999px;
    background: rgba(255,255,255,0.16);
    color: inherit;
  }
  .clip-card.white .clip-tag, .clip-card.yellow .clip-tag, .clip-card.mint .clip-tag, .clip-card.pink .clip-tag {
    background: rgba(0,0,0,0.08);
  }

  .copy-burst {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
    opacity: 0; transform: scale(0.95);
    transition: opacity .25s, transform .25s;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    color: white;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600; font-size: 22px; letter-spacing: -0.01em;
    z-index: 5;
  }
  .clip-card.copied .copy-burst { opacity: 1; transform: scale(1); }
  .copy-burst .check {
    width: 56px; height: 56px; border-radius: 999px;
    background: var(--mint); color: var(--ink);
    display: inline-flex; align-items: center; justify-content: center;
    margin-right: 14px;
  }

  /* Decorative shapes (feature card) */
  .deco {
    position: absolute; pointer-events: none;
    opacity: 0.55; mix-blend-mode: overlay;
  }
  .deco.dot {
    width: 130px; height: 130px; border-radius: 999px;
    background: rgba(255,255,255,0.85); top: 38%; left: 22%;
  }
  .deco.sq {
    width: 110px; height: 110px;
    background: rgba(255,255,255,0.85); top: 44%; right: 22%;
    transform: rotate(18deg);
  }
  .deco.tri {
    width: 0; height: 0; top: 56%; left: 38%;
    border-left: 70px solid transparent;
    border-right: 70px solid transparent;
    border-bottom: 120px solid rgba(255,255,255,0.85);
  }

  /* Add card */
  .add-card {
    grid-column: span 4;
    min-height: 260px;
    background: transparent;
    border: 1.5px dashed rgba(255,255,255,0.18);
    color: var(--text-dim);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
    cursor: pointer; transition: border-color .2s, color .2s, background .2s;
    border-radius: var(--radius);
  }
  .add-card:hover { border-color: rgba(255,255,255,0.4); color: var(--text); background: rgba(255,255,255,0.02); }
  .add-card .plus {
    width: 48px; height: 48px; border-radius: 999px;
    background: rgba(255,255,255,0.06); display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid var(--line);
  }

  /* Editor modal */
  .modal-bg {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    right: 0 !important;
    bottom: 0 !important;
    width: 100vw !important;
    height: 100vh !important;
    background: rgba(0,0,0,0.8) !important;
    backdrop-filter: blur(12px) !important;
    z-index: 2147483647 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    padding: 24px;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  .modal {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--line);
    border-radius: 24px;
    width: 100%; max-width: 640px;
    padding: 28px;
    animation: pop .25s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes pop { from { transform: scale(.96); opacity: 0 } to { transform: scale(1); opacity: 1 } }
  .modal h3 { font-family: 'Space Grotesk'; font-weight: 600; font-size: 22px; margin: 0 0 6px; letter-spacing: -0.02em; }
  .modal p.sub { color: var(--text-dim); font-size: 13px; margin: 0 0 22px; }
  .modal label { display: block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; font-weight: 600; }
  .modal input, .modal textarea, .modal select {
    width: 100%; background: var(--bg); color: var(--text);
    border: 1px solid var(--line); border-radius: 14px;
    padding: 12px 14px; font: inherit; font-size: 14px;
    margin-bottom: 16px; outline: 0;
    transition: border-color .2s;
  }
  .modal input:focus, .modal textarea:focus, .modal select:focus { border-color: var(--accent); }
  .modal textarea { min-height: 140px; resize: vertical; font-family: 'Inter'; }
  .color-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .color-swatch {
    width: 36px; height: 36px; border-radius: 12px; cursor: pointer;
    border: 2px solid transparent; transition: transform .15s, border-color .15s;
  }
  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.active { border-color: white; transform: scale(1.1); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 8px; }
  .btn {
    padding: 11px 18px; border-radius: 999px; border: 0; cursor: pointer;
    font: inherit; font-size: 13px; font-weight: 600;
    transition: background .2s, transform .15s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent-soft); }
  .btn-ghost { background: rgba(255,255,255,0.06); color: var(--text); }
  .btn-ghost:hover { background: rgba(255,255,255,0.1); }
  .btn-danger { background: rgba(255,87,87,0.15); color: #ff8a8a; }
  .btn-danger:hover { background: rgba(255,87,87,0.25); }

  /* Toast */
  .toast-wrap {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    z-index: 200; display: flex; flex-direction: column; gap: 8px; align-items: center;
    pointer-events: none;
  }
  .toast {
    background: white; color: var(--ink);
    padding: 12px 20px; border-radius: 999px;
    font-weight: 600; font-size: 13px;
    display: inline-flex; align-items: center; gap: 10px;
    box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
    animation: toastIn .3s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes toastIn { from { transform: translateY(20px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
  .toast .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--accent); }

  /* Responsive */
  @media (max-width: 1100px) {
    .clip-card, .add-card { grid-column: span 6; }
    .clip-card.feature { grid-column: span 12; min-height: 480px; }
    .clip-card.wide, .clip-card.half { grid-column: span 12; }
  }
  @media (max-width: 720px) {
    .topbar { padding: 16px; flex-wrap: wrap; gap: 10px; }
    .search { min-width: 100%; order: 3; }
    .nav { display: none; }
    .hero { padding: 36px 16px 16px; }
    .grid-wrap { padding: 8px 16px 60px; }
    .clip-card, .add-card { grid-column: span 12; min-height: 220px; }
    .clip-card.feature { min-height: 380px; }
    .stats-row { gap: 18px; flex-wrap: wrap; }
  }

  /* Subtle animated noise on body */
  body::before {
    content: ""; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' /></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.4' /></svg>");
    opacity: 0.03; pointer-events: none; z-index: 1;
  }
  .stack > * { position: relative; z-index: 2; }
</style>
</head>

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(true); // Always open in this demo unless hidden
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onClick={() => setOpen(false)}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ title, children }) {
  return (
    <>
      <div className="twk-sect">{title}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>

}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button">
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ onClick, children }) {
  return (
    <button type="button" className="twk-btn" onClick={onClick}>{children}</button>
  );
}

    try {
      const saved = localStorage.getItem("clipboard-data-v2");
      return saved ? JSON.parse(saved) : SEED;
    } catch { return SEED; }
  });
  const [favorites, setFavorites] = useState(() => {
    try { return JSON.parse(localStorage.getItem("clipboard-favs-v2") || "[]"); } catch { return []; }
  });
  const [hero, setHero] = useState(() => {
    try { return JSON.parse(localStorage.getItem("clipboard-hero-v1") || JSON.stringify(HERO_DEFAULT)); } catch { return HERO_DEFAULT; }
  });
  const [search, setSearch] = useState("");
  const [editing, setEditing] = useState(null); 
  const [copiedId, setCopiedId] = useState(null);
  const [toast, setToast] = useState(null);
  const [isEditingHero, setIsEditingHero] = useState(false);

  useEffect(() => { localStorage.setItem("clipboard-data-v2", JSON.stringify(data)); }, [data]);
  useEffect(() => { localStorage.setItem("clipboard-favs-v2", JSON.stringify(favorites)); }, [favorites]);
  useEffect(() => { localStorage.setItem("clipboard-hero-v1", JSON.stringify(hero)); }, [hero]);

  const handleExport = () => {
    const exportData = { data, favorites, hero, timestamp: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `clipboard-export-${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    setToast({ msg: "Datos exportados correctamente", ts: Date.now() });
    setTimeout(() => setToast(null), 2000);
  };

  const handleImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (imported.data) setData(imported.data);
        if (imported.favorites) setFavorites(imported.favorites);
        if (imported.hero) setHero(imported.hero);
        setToast({ msg: "Datos importados con éxito", ts: Date.now() });
        setTimeout(() => setToast(null), 2000);
      } catch (err) {
        alert("Error al importar el archivo. Asegúrate de que sea un JSON válido.");
      }
    };
    reader.readAsText(file);
  };

  const handleCopy = async (item) => {
    try {
      await navigator.clipboard.writeText(item.content);
    } catch (e) {
      const ta = document.createElement("textarea");
      ta.value = item.content; document.body.appendChild(ta);
      ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
    }
    setCopiedId(item.id);
    setTimeout(() => setCopiedId(null), 1200);
    setToast({ msg: `Copiado: ${item.title}`, ts: Date.now() });
    setTimeout(() => setToast(null), 1800);
  };

  const toggleFav = (id) => {
    setFavorites((f) => {
      const isFav = f.includes(id);
      const newFavs = isFav ? f.filter(x => x !== id) : [...f, id];
      
      if (!isFav) {
        // Automatically promote to top of its section
        setData(prev => prev.map(section => {
          const idx = section.items.findIndex(it => it.id === id);
          if (idx > -1) {
            const items = [...section.items];
            const [item] = items.splice(idx, 1);
            items.unshift(item);
            return { ...section, items };
          }
          return section;
        }));
      }
      return newFavs;
    });
  };

  const moveSection = (idx, dir) => {
    setData(prev => {
      const nd = [...prev];
      const nIdx = idx + dir;
      if (nIdx < 0 || nIdx >= nd.length) return prev;
      [nd[idx], nd[nIdx]] = [nd[nIdx], nd[idx]];
      return nd;
    });
  };

  const moveItem = (sIdx, iIdx, dir) => {
    setData(prev => {
      const nd = prev.map(s => ({ ...s, items: [...s.items] }));
      const nIdx = iIdx + dir;
      if (nIdx < 0 || nIdx >= nd[sIdx].items.length) return prev;
      [nd[sIdx].items[iIdx], nd[sIdx].items[nIdx]] = [nd[sIdx].items[nIdx], nd[sIdx].items[iIdx]];
      return nd;
    });
  };

  const saveItem = (newItem, ctx) => {
    const { sectionTitle, ...itemData } = newItem;
    setData(d => {
      let nd = d.map(s => ({ ...s, items: [...s.items] }));
      
      // Find or create target section
      let targetSectionIdx = nd.findIndex(s => s.section === sectionTitle);
      if (targetSectionIdx === -1) {
        nd.push({ section: sectionTitle, items: [] });
        targetSectionIdx = nd.length - 1;
      }

      if (ctx.new) {
        const idStr = "n" + Date.now();
        nd[targetSectionIdx].items.push({ ...itemData, id: idStr });
      } else {
        // If section changed, move item
        if (targetSectionIdx !== ctx.sectionIdx) {
          const item = nd[ctx.sectionIdx].items[ctx.itemIdx];
          nd[ctx.sectionIdx].items.splice(ctx.itemIdx, 1);
          nd[targetSectionIdx].items.push({ ...item, ...itemData });

      <Hero

      />

      <div className="grid-wrap">
        {filteredData.map((section, sIdx) => (
          <div key={section.section}>
            <div className="section-head">
              <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
                <h2 className="display">{section.section} <span className="pill">{section.items.length}</span></h2>
                <div style={{ display: "flex", gap: "4px" }}>
                  <button className="icon-btn" onClick={() => moveSection(sIdx, -1)} disabled={sIdx === 0} style={{ opacity: sIdx === 0 ? 0.3 : 1 }}>
                    <Icon.Up style={{ width: 14, height: 14 }} />
                  </button>
                  <button className="icon-btn" onClick={() => moveSection(sIdx, 1)} disabled={sIdx === data.length - 1} style={{ opacity: sIdx === data.length - 1 ? 0.3 : 1 }}>
                    <Icon.Down style={{ width: 14, height: 14 }} />
                  </button>
                </div>
              </div>
              <button className="add" onClick={() => setEditing({ new: true, sectionIdx: data.findIndex(x => x.section === section.section) })}>
                <Icon.Plus /> Añadir
              </button>
            </div>
            <div className="bento">
              {section.items.map((item, iIdx) => {
                const realSectionIdx = data.findIndex(x => x.section === section.section);
                const realIdx = data[realSectionIdx].items.findIndex(x => x.id === item.id);
                return (
                  <ClipCard
                    key={item.id}
                    item={item}
                    isFav={favorites.includes(item.id)}
                    isCopied={copiedId === item.id}
                    onCopy={() => handleCopy(item)}
                    onFav={() => toggleFav(item.id)}
                    onEdit={() => setEditing({ sectionIdx: realSectionIdx, itemIdx: realIdx, item })}
                    onMove={(dir) => moveItem(realSectionIdx, realIdx, dir)}
                    isFirst={iIdx === 0}
                    isLast={iIdx === section.items.length - 1}
                    showShapes={SHOW_SHAPES}
                  />
                );
              })}
              {sIdx === 0 && !search && (
                <div className="add-card" onClick={() => setEditing({ new: true, sectionIdx: 0 })}>
                  <div className="plus"><Icon.Plus /></div>
                  <div style={{ fontSize: 13, fontWeight: 500 }}>Crear nuevo bloque</div>
                </div>
              )}
            </div>
          </div>
        ))}
        {filteredData.length === 0 && (
          <div style={{ textAlign: "center", padding: "80px 20px", color: "var(--text-dim)" }}>
            <div className="display" style={{ fontSize: 32, color: "white", marginBottom: 8 }}>Sin resultados</div>
            <div>Intenta con otra palabra o crea un nuevo bloque.</div>
          </div>
        )}
      </div>

      {editing && (
        <Editor
          ctx={editing}
          onSave={(item) => { saveItem(item, editing); setEditing(null); }}
          onDelete={() => { deleteItem(editing); setEditing(null); }}
          onClose={() => setEditing(null)}
          sections={data.map(s => s.section)}
        />
      )}

      {toast && (
        <div className="toast-wrap">
          <div className="toast"><span className="dot"></span>{toast.msg}</div>
        </div>
      )}
    </>
  );
}

function TopBar({ search, setSearch, onExport, onImport }) {
  const fileInputRef = useRef(null);

  return (
    <div className="topbar">
      <div className="brand display">
        <div className="brand-mark">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </div>
        copiar.online
      </div>
      <div className="search">
        <Icon.Search style={{ color: "var(--text-dim)" }} />
        <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Buscar bloques, etiquetas..." />
        <span className="kbd">⌘K</span>
      </div>
      <div className="nav">
        <button className="btn btn-ghost" onClick={onExport} style={{ display: "flex", gap: "8px", alignItems: "center" }}>
          <Icon.Download /> Exportar
        </button>
        <button className="btn btn-ghost" onClick={() => fileInputRef.current.click()} style={{ display: "flex", gap: "8px", alignItems: "center" }}>
          <Icon.Upload /> Importar
        </button>
        <input type="file" ref={fileInputRef} onChange={onImport} accept=".json" style={{ display: "none" }} />
        <a href="#" style={{ color: "white", background: "var(--accent)", marginLeft: "8px" }}>Ingresar</a>
      </div>
    </div>
  );
}

function Hero({ totalItems, sectionsCount, favCount, hero, onUpdateHero }) {
  const [isEditing, setIsEditing] = useState(false);
  const [line1, setLine1] = useState(hero.line1);
  const [line2, setLine2] = useState(hero.line2);

  const handleSave = () => {
    onUpdateHero({ line1, line2 });
    setIsEditing(false);
  };

  return (
    <div className="hero">
      {!isEditing ? (
        <div style={{ position: "relative", cursor: "pointer" }} onClick={() => setIsEditing(true)} title="Haz clic para editar el encabezado">
          <h1 className="display">
            {hero.line1}<br />
            <em>{hero.line2}</em> <span className="accent">→</span>
          </h1>
          <button className="icon-btn" style={{ position: "absolute", top: 0, right: 0, opacity: 0.2 }}>
            <Icon.Edit />
          </button>
        </div>
      ) : (
        <div style={{ background: "rgba(255,255,255,0.03)", padding: "24px", borderRadius: "24px", marginBottom: "24px", border: "1px solid var(--line)" }}>
          <label style={{ display: "block", fontSize: "11px", color: "var(--text-dim)", marginBottom: "8px" }}>LÍNEA 1</label>
          <input className="display" value={line1} onChange={(e) => setLine1(e.target.value)} style={{ background: "transparent", border: "0", borderBottom: "1px solid var(--accent)", color: "white", fontSize: "32px", width: "100%", outline: "0", marginBottom: "16px" }} />
          <label style={{ display: "block", fontSize: "11px", color: "var(--text-dim)", marginBottom: "8px" }}>LÍNEA 2 (CURSIVA)</label>
          <input className="display" value={line2} onChange={(e) => setLine2(e.target.value)} style={{ background: "transparent", border: "0", borderBottom: "1px solid var(--accent)", color: "white", fontSize: "32px", width: "100%", outline: "0", fontStyle: "italic" }} />
          <div style={{ marginTop: "24px", display: "flex", gap: "10px" }}>
            <button className="btn btn-primary" onClick={handleSave}>Guardar Encabezado</button>
            <button className="btn btn-ghost" onClick={() => { setLine1(hero.line1); setLine2(hero.line2); setIsEditing(false); }}>Cancelar</button>
          </div>
        </div>
      )}
      <div className="hero-meta">
        <span className="pill"><span style={{ width: 6, height: 6, borderRadius: 999, background: "var(--mint)" }}></span>Sincronizado</span>
        <span className="pill">Tu portapapeles · público</span>
        <span className="pill">v 4.2</span>
      </div>
      <div className="stats-row">
        <div className="stat"><strong>{totalItems}</strong>Bloques</div>
        <div className="stat"><strong>{sectionsCount}</strong>Categorías</div>
        <div className="stat"><strong>{favCount}</strong>Favoritos</div>
      </div>
    </div>
  );
}

function ClipCard({ item, isFav, isCopied, onCopy, onFav, onEdit, onMove, isFirst, isLast, showShapes }) {
  const sizeClass = item.size || "normal";
  const colorClass = item.color === "default" ? "" : item.color;
  const isLight = ["yellow", "white", "mint", "pink"].includes(item.color);
  const arrowColor = isLight ? "dark" : "";

  return (
    <div className={`clip-card card ${sizeClass} ${colorClass} ${isCopied ? "copied" : ""}`} onClick={onCopy}>
      <div className="card-tl">
        <span className="card-title display">{item.title}</span>
        <div style={{ display: "flex", gap: 6 }}>
          <div style={{ display: "flex", background: "rgba(0,0,0,0.1)", borderRadius: "999px", padding: "2px" }}>
            <button className={`icon-btn ${arrowColor}`} style={{ width: 28, height: 28 }} onClick={(e) => { e.stopPropagation(); onMove(-1); }} disabled={isFirst} title="Mover izquierda">
              <Icon.Left style={{ width: 12, height: 12, opacity: isFirst ? 0.2 : 1 }} />
            </button>
            <button className={`icon-btn ${arrowColor}`} style={{ width: 28, height: 28 }} onClick={(e) => { e.stopPropagation(); onMove(1); }} disabled={isLast} title="Mover derecha">
              <Icon.Right style={{ width: 12, height: 12, opacity: isLast ? 0.2 : 1 }} />
            </button>
          </div>
          <button className={`icon-btn ${arrowColor}`} onClick={(e) => { e.stopPropagation(); onFav(); }} title="Favorito">
            <Icon.Star filled={isFav} />
          </button>
          <button className={`icon-btn ${arrowColor}`} onClick={(e) => { e.stopPropagation(); onEdit(); }} title="Editar">
            <Icon.Edit />
          </button>
        </div>
      </div>

      {item.size === "feature" && showShapes && (
        <>
          <div className="deco dot"></div>
          <div className="deco sq"></div>
          <div className="deco tri"></div>
        </>
      )}

      <div className="clip-headline display">{item.size === "feature" ? item.content.split('\n')[0] : null}</div>
      <div className="clip-preview">{item.content}</div>

      <div className="card-bl">
        <div className="clip-meta-row">
          {(item.tags || []).map(t => <span key={t} className="clip-tag mono">{t}</span>)}
        </div>
        <button className={`icon-btn ${arrowColor}`}>
          {item.size === "feature" ? <Icon.Down /> : <Icon.Arrow />}
        </button>
      </div>

      <div className="copy-burst display">
        <span className="check"><Icon.Check /></span>
        ¡Copiado!
      </div>
    </div>
  );
}

function Editor({ ctx, onSave, onDelete, onClose, sections }) {
  const seed = ctx.new ? { title: "", content: "", color: "default", size: "normal", tags: [] } : ctx.item;
  const initialSection = !ctx.new ? sections[ctx.sectionIdx] : (sections[ctx.sectionIdx] || sections[0]);
  
  const [title, setTitle] = useState(seed.title);
  const [content, setContent] = useState(seed.content);
  const [color, setColor] = useState(seed.color);
  const [size, setSize] = useState(seed.size);
  const [tagsStr, setTagsStr] = useState((seed.tags || []).join(", "));
  const [sectionTitle, setSectionTitle] = useState(initialSection);
  const [isNewSection, setIsNewSection] = useState(false);
  const [customSection, setCustomSection] = useState("");

  const colors = [
    { id: "default", v: "#161618" },
    { id: "blue", v: "#3D2BFF" },
    { id: "yellow", v: "#F4F378" },
    { id: "white", v: "#FFFFFF" },
    { id: "mint", v: "#C9F27E" },
    { id: "pink", v: "#FF87C8" },
  ];

  useEffect(() => {
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = ''; };
  }, []);

  const handleSave = () => {
    const finalSection = isNewSection ? customSection.trim() : sectionTitle;
    if (!finalSection) { alert("Por favor elige o crea una categoría"); return; }
    if (!title.trim() || !content.trim()) { alert("Falta título o contenido"); return; }
    
    onSave({ 
      title: title.trim(), 
      content: content.trim(), 
      color, 
      size, 
      tags: tagsStr.split(',').map(t => t.trim()).filter(Boolean),
      sectionTitle: finalSection
    });
  };

  return ReactDOM.createPortal(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <h3 className="display">{ctx.new ? "Nuevo bloque" : "Editar bloque"}</h3>
        <p className="sub">Configura tu atajo de portapapeles.</p>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "16px" }}>
          <div>
            <label>Título</label>
            <input value={title} onChange={(e) => setTitle(e.target.value)} placeholder="Ej. Saludo Cliente" />
          </div>
          <div>
            <label>Categoría</label>
            {!isNewSection ? (
              <div style={{ display: "flex", gap: "8px" }}>
                <select style={{ flex: 1 }} value={sectionTitle} onChange={(e) => setSectionTitle(e.target.value)}>
                  {sections.map(s => <option key={s} value={s}>{s}</option>)}
                </select>
                <button className="btn btn-ghost" style={{ padding: "0 12px" }} onClick={() => setIsNewSection(true)}>+</button>
              </div>
            ) : (
              <div style={{ display: "flex", gap: "8px" }}>
                <input style={{ flex: 1 }} value={customSection} onChange={(e) => setCustomSection(e.target.value)} placeholder="Nueva categoría..." autoFocus />
                <button className="btn btn-ghost" style={{ padding: "0 12px" }} onClick={() => setIsNewSection(false)}>✕</button>
              </div>
            )}
          </div>
        </div>

        <label>Contenido a copiar</label>
        <textarea 
          value={content} 
          onChange={(e) => setContent(e.target.value)} 
          placeholder="Pega aquí el texto que se copiará al portapapeles..." 
        />

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "16px" }}>
          <div>
            <label>Etiquetas (separadas por coma)</label>
            <input value={tagsStr} onChange={(e) => setTagsStr(e.target.value)} placeholder="ventas, ayuda, etc" />
          </div>
          <div>
            <label>Tamaño de tarjeta</label>
            <select value={size} onChange={(e) => setSize(e.target.value)}>
              <option value="normal">Normal</option>
              <option value="half">Mediano (1/2)</option>
              <option value="wide">Ancho (2/3)</option>
              <option value="feature">Destacado (Grande)</option>
            </select>
          </div>
        </div>

        <label>Color de fondo</label>
        <div className="color-row">
          {colors.map(c => (
            <div key={c.id} className={`color-swatch ${color === c.id ? "active" : ""}`}
              style={{ background: c.v, border: c.id === 'default' ? '1px solid var(--line)' : 'none' }} 
              onClick={() => setColor(c.id)} />
          ))}
        </div>

        <div className="modal-actions">
          {!ctx.new && <button className="btn btn-danger" onClick={onDelete}>Eliminar</button>}
          <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" onClick={handleSave}>Guardar bloque</button>
        </div>
      </div>
    </div>,
    document.body
  );
}

const container = document.getElementById('app');
const root = ReactDOM.createRoot(container);
root.render(<App />);
  </script>
</body>
