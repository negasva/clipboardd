<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Clipboard — copiar.online</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --bg: #000000;
    --surface: #0E0E10;
    --surface-2: #161618;
    --line: rgba(255,255,255,0.08);
    --text: #FFFFFF;
    --text-dim: rgba(255,255,255,0.55);
    --accent: #3D2BFF;
    --accent-soft: #5847FF;
    --yellow: #F4F378;
    --mint: #C9F27E;
    --pink: #FF87C8;
    --ink: #0A0A0B;
    --radius: 28px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  body {
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(61,43,255,0.18), transparent 60%),
      radial-gradient(900px 500px at 0% 30%, rgba(244,243,120,0.05), transparent 60%),
      var(--bg);
    min-height: 100vh;
  }
  ::selection { background: var(--accent); color: white; }

  .display { font-family: 'Space Grotesk', sans-serif; font-weight: 600; letter-spacing: -0.02em; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* Card baseline */
  .card {
    position: relative;
    border-radius: var(--radius);
    padding: 24px;
    overflow: hidden;
    transition: transform .35s cubic-bezier(.2,.8,.2,1), box-shadow .35s;
    will-change: transform;
  }
  .card:hover { transform: translateY(-3px); }
  .card-tl { position: absolute; top: 22px; left: 24px; right: 24px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .card-bl { position: absolute; bottom: 22px; left: 24px; right: 24px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .card-title { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 15px; letter-spacing: 0.01em; }

  .icon-btn {
    width: 38px; height: 38px;
    border-radius: 999px;
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.08);
    color: inherit;
    border: 0; cursor: pointer;
    transition: background .2s, transform .2s;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.16); transform: scale(1.06); }
  .icon-btn.dark { background: rgba(0,0,0,0.08); }
  .icon-btn.dark:hover { background: rgba(0,0,0,0.16); }

  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 10px; border-radius: 999px;
    background: rgba(255,255,255,0.06);
    color: var(--text-dim);
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
    border: 1px solid var(--line);
  }

  /* Top bar */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 28px;
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(14px);
    background: rgba(0,0,0,0.55);
    border-bottom: 1px solid var(--line);
  }
  .brand {
    display: inline-flex; align-items: center; gap: 12px;
    font-family: 'Space Grotesk', sans-serif; font-weight: 600;
    font-size: 18px; letter-spacing: -0.01em;
  }
  .brand-mark {
    width: 32px; height: 32px; border-radius: 10px;
    background: var(--accent);
    display: inline-flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 20px -6px rgba(61,43,255,0.7);
  }

  .nav { display: flex; gap: 6px; align-items: center; }
  .nav a {
    color: var(--text-dim); font-size: 13px; font-weight: 500;
    text-decoration: none; padding: 9px 14px; border-radius: 999px;
    transition: color .2s, background .2s;
  }
  .nav a:hover { color: var(--text); background: rgba(255,255,255,0.06); }

  .search {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 14px; border-radius: 999px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--line);
    min-width: 280px;
  }
  .search input {
    background: transparent; border: 0; outline: 0;
    color: var(--text); font: inherit; font-size: 13px;
    flex: 1;
  }
  .search input::placeholder { color: var(--text-dim); }
  .kbd {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    padding: 3px 6px; border-radius: 6px;
    background: rgba(255,255,255,0.08);
    color: var(--text-dim);
    border: 1px solid var(--line);
  }

  /* Hero */
  .hero {
    padding: 56px 28px 28px;
    max-width: 1440px; margin: 0 auto;
  }
  .hero h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600; letter-spacing: -0.035em;
    font-size: clamp(48px, 8vw, 112px);
    line-height: 0.95;
    margin: 0 0 24px;
  }
  .hero h1 .accent { color: var(--accent); }
  .hero h1 em { font-style: italic; font-family: 'Space Grotesk', sans-serif; font-weight: 400; }
  .hero-meta {
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    margin-top: 8px;
  }

  .stats-row {
    display: flex; gap: 28px; padding-top: 28px;
    border-top: 1px solid var(--line); margin-top: 36px;
    color: var(--text-dim); font-size: 12px;
  }
  .stat strong { color: var(--text); font-family: 'Space Grotesk', sans-serif; font-size: 22px; display:block; margin-bottom:4px; letter-spacing:-0.02em; }

  /* Bento grid */
  .grid-wrap { padding: 16px 28px 80px; max-width: 1440px; margin: 0 auto; }
  .section-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 6px; margin-top: 22px;
  }
  .section-head h2 {
    font-family: 'Space Grotesk', sans-serif; font-weight: 500;
    font-size: 14px; letter-spacing: 0.05em; text-transform: uppercase;
    color: var(--text-dim); margin: 0;
    display: inline-flex; align-items: center; gap: 10px;
  }
  .section-head h2::before {
    content: ""; width: 8px; height: 8px; border-radius: 999px; background: var(--accent);
  }
  .section-head .add {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 14px; border-radius: 999px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--line);
    color: var(--text); font-size: 12px; font-weight: 500;
    cursor: pointer; transition: background .2s;
  }
  .section-head .add:hover { background: rgba(255,255,255,0.1); }

  .bento {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 16px;
  }
  .clip-card {
    grid-column: span 4;
    min-height: 260px;
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--text);
    cursor: pointer;
  }
  .clip-card[draggable="true"] { cursor: grab; }
  .clip-card[draggable="true"]:active { cursor: grabbing; }
  .clip-card.drag-active {
    outline: 2px solid rgba(61, 43, 255, 0.55);
    outline-offset: 2px;
  }
  .clip-card.feature {
    grid-column: span 6;
    grid-row: span 2;
    min-height: 540px;
  }
  .clip-card.wide { grid-column: span 8; }
  .clip-card.half { grid-column: span 6; }
  .clip-card.tall { grid-row: span 2; min-height: 540px; }

  .clip-card.blue { background: var(--accent); color: white; border-color: transparent; }
  .clip-card.yellow { background: var(--yellow); color: var(--ink); border-color: transparent; }
  .clip-card.white { background: white; color: var(--ink); border-color: transparent; }
  .clip-card.mint { background: var(--mint); color: var(--ink); border-color: transparent; }
  .clip-card.pink { background: var(--pink); color: var(--ink); border-color: transparent; }

  .clip-headline {
    font-family: 'Space Grotesk', sans-serif; font-weight: 600;
    letter-spacing: -0.025em;
    font-size: clamp(28px, 3.4vw, 56px);
    line-height: 1.0;
    margin-top: 56px;
    text-wrap: balance;
  }
  .clip-card.feature .clip-headline { font-size: clamp(40px, 4.8vw, 84px); }

  .clip-preview {
    margin-top: 18px;
    font-size: 13px;
    line-height: 1.55;
    opacity: 0.8;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .clip-card.feature .clip-preview { -webkit-line-clamp: 8; font-size: 14px; }

  .clip-meta-row { display: flex; gap: 8px; align-items: center; }
  .clip-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; padding: 5px 9px; border-radius: 999px;
    background: rgba(255,255,255,0.16);
    color: inherit;
  }
  .clip-card.white .clip-tag, .clip-card.yellow .clip-tag, .clip-card.mint .clip-tag, .clip-card.pink .clip-tag {
    background: rgba(0,0,0,0.08);
  }

  .copy-burst {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
    opacity: 0; transform: scale(0.95);
    transition: opacity .25s, transform .25s;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    color: white;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600; font-size: 22px; letter-spacing: -0.01em;
    z-index: 5;
  }
  .clip-card.copied .copy-burst { opacity: 1; transform: scale(1); }
  .copy-burst .check {
    width: 56px; height: 56px; border-radius: 999px;
    background: var(--mint); color: var(--ink);
    display: inline-flex; align-items: center; justify-content: center;
    margin-right: 14px;
  }

  /* Decorative shapes (feature card) */
  .deco {
    position: absolute; pointer-events: none;
    opacity: 0.55; mix-blend-mode: overlay;
  }
  .deco.dot {
    width: 130px; height: 130px; border-radius: 999px;
    background: rgba(255,255,255,0.85); top: 38%; left: 22%;
  }
  .deco.sq {
    width: 110px; height: 110px;
    background: rgba(255,255,255,0.85); top: 44%; right: 22%;
    transform: rotate(18deg);
  }
  .deco.tri {
    width: 0; height: 0; top: 56%; left: 38%;
    border-left: 70px solid transparent;
    border-right: 70px solid transparent;
    border-bottom: 120px solid rgba(255,255,255,0.85);
  }

  /* Add card */
  .add-card {
    grid-column: span 4;
    min-height: 260px;
    background: transparent;
    border: 1.5px dashed rgba(255,255,255,0.18);
    color: var(--text-dim);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
    cursor: pointer; transition: border-color .2s, color .2s, background .2s;
    border-radius: var(--radius);
  }
  .add-card:hover { border-color: rgba(255,255,255,0.4); color: var(--text); background: rgba(255,255,255,0.02); }
  .add-card .plus {
    width: 48px; height: 48px; border-radius: 999px;
    background: rgba(255,255,255,0.06); display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid var(--line);
  }

  /* Editor modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  .modal {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--line);
    border-radius: 24px;
    width: 100%; max-width: 640px;
    padding: 28px;
    animation: pop .25s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes pop { from { transform: scale(.96); opacity: 0 } to { transform: scale(1); opacity: 1 } }
  .modal h3 { font-family: 'Space Grotesk'; font-weight: 600; font-size: 22px; margin: 0 0 6px; letter-spacing: -0.02em; }
  .modal p.sub { color: var(--text-dim); font-size: 13px; margin: 0 0 22px; }
  .modal label { display: block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; font-weight: 600; }
  .modal input, .modal textarea, .modal select {
    width: 100%; background: var(--bg); color: var(--text);
    border: 1px solid var(--line); border-radius: 14px;
    padding: 12px 14px; font: inherit; font-size: 14px;
    margin-bottom: 16px; outline: 0;
    transition: border-color .2s;
  }
  .modal input:focus, .modal textarea:focus, .modal select:focus { border-color: var(--accent); }
  .modal textarea { min-height: 140px; resize: vertical; font-family: 'Inter'; }
  .color-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .color-swatch {
    width: 36px; height: 36px; border-radius: 12px; cursor: pointer;
    border: 2px solid transparent; transition: transform .15s, border-color .15s;
  }
  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.active { border-color: white; transform: scale(1.1); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 8px; }
  .btn {
    padding: 11px 18px; border-radius: 999px; border: 0; cursor: pointer;
    font: inherit; font-size: 13px; font-weight: 600;
    transition: background .2s, transform .15s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent-soft); }
  .btn-ghost { background: rgba(255,255,255,0.06); color: var(--text); }
  .btn-ghost:hover { background: rgba(255,255,255,0.1); }
  .btn-danger { background: rgba(255,87,87,0.15); color: #ff8a8a; }
  .btn-danger:hover { background: rgba(255,87,87,0.25); }

  /* Toast */
  .toast-wrap {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    z-index: 200; display: flex; flex-direction: column; gap: 8px; align-items: center;
    pointer-events: none;
  }
  .toast {
    background: white; color: var(--ink);
    padding: 12px 20px; border-radius: 999px;
    font-weight: 600; font-size: 13px;
    display: inline-flex; align-items: center; gap: 10px;
    box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
    animation: toastIn .3s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes toastIn { from { transform: translateY(20px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
  .toast .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--accent); }

  /* Responsive */
  @media (max-width: 1100px) {
    .clip-card, .add-card { grid-column: span 6; }
    .clip-card.feature { grid-column: span 12; min-height: 480px; }
    .clip-card.wide, .clip-card.half { grid-column: span 12; }
  }
  @media (max-width: 720px) {
    .topbar { padding: 16px; flex-wrap: wrap; gap: 10px; }
    .search { min-width: 100%; order: 3; }
    .nav { display: none; }
    .hero { padding: 36px 16px 16px; }
    .grid-wrap { padding: 8px 16px 60px; }
    .clip-card, .add-card { grid-column: span 12; min-height: 220px; }
    .clip-card.feature { min-height: 380px; }
    .stats-row { gap: 18px; flex-wrap: wrap; }
  }

  /* Subtle animated noise on body */
  body::before {
    content: ""; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' /></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.4' /></svg>");
    opacity: 0.03; pointer-events: none; z-index: 1;
  }
  .stack > * { position: relative; z-index: 2; }
</style>
</head>
<body>
  <div id="app" class="stack"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
